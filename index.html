<!DOCTYPE html>
<html>
<head>
    <title>Abhishek E-commerce Solutions</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #0b5ed7;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🤖 Abhishek E-commerce Solutions</h2>

    <div id="chat-box"></div><br>

    <input type="text" id="user-input" placeholder="Type your message...">
    <button id="send-btn">Send</button>
</div>

<script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const input = document.getElementById("user-input");
    const button = document.getElementById("send-btn");
    const box = document.getElementById("chat-box");

    // ✅ Button click
    button.addEventListener("click", sendMessage);

    // ✅ Enter key
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    async function sendMessage() {
        let msg = input.value;

        if (!msg) return;

        box.innerHTML += "<p><b>You:</b> " + msg + "</p>";

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: msg })
            });

            const data = await res.json();

            let formatted = data.response.replace(/\n/g, "<br>");

            box.innerHTML += "<p><b>Bot:</b><br>" + formatted + "</p>";

        } catch (err) {
            box.innerHTML += "<p style='color:red;'>ERROR connecting to backend</p>";
        }

        input.value = "";
        box.scrollTop = box.scrollHeight;
    }

});
</script>
