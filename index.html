<!DOCTYPE html>
<html>
<head>
<title>Abhishek E-commerce Solutions</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

#chat-box {
  height: 400px;
  overflow: auto;
  border: 1px solid #ccc;
  padding: 10px;
}

input {
  width: 75%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #0b5ed7;
  color: white;
}
</style>

</head>

<body>

<div class="container">
<h2>🤖 Abhishek E-commerce Solutions</h2>

<div id="chat-box"></div><br>

<input type="text" id="user-input" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const box = document.getElementById("chat-box");

    let msg = input.value;
    if (!msg) return;

    box.innerHTML += "<p><b>You:</b> " + msg + "</p>";

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({message: msg})
        });

        const data = await res.json();
        box.innerHTML += "<p><b>Bot:</b> " + data.response + "</p>";

    } catch {
        box.innerHTML += "<p style='color:red;'>ERROR</p>";
    }

    input.value = "";
}
</script>

</body>
</html>
