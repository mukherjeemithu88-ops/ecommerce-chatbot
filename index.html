<!DOCTYPE html>
<html>
<head>
    <title>Abhishek E-commerce Solutions</title>
</head>

<body style="font-family: Arial; margin: 20px;">

    <h2>🤖 Abhishek E-commerce Solutions</h2>

    <div id="chat-box" style="border:1px solid #ccc; padding:10px; height:400px; overflow:auto;">
    </div>

    <br>

    <input type="text" id="user-input" placeholder="Type your message..." style="width:80%; padding:10px;">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");

            const message = input.value;

            if (!message) return;

            // Show user message
            chatBox.innerHTML += "<p><b>You:</b> " + message + "</p>";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Show bot response
                chatBox.innerHTML += "<p><b>Bot:</b> " + data.response + "</p>";

            } catch (error) {
                chatBox.innerHTML += "<p style='color:red;'>ERROR</p>";
            }

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>
</html>
